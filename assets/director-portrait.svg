<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 340" width="280" height="340">
  <defs>
    <linearGradient id="bgGr" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="60%" stop-color="#f1f8e9"/>
      <stop offset="100%" stop-color="#dcedc8"/>
    </linearGradient>
    <linearGradient id="skinGr" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#e8b888"/>
      <stop offset="100%" stop-color="#d4956a"/>
    </linearGradient>
    <linearGradient id="coatGr" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f4f4f4"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="280" height="340" rx="16"/>
    </clipPath>
  </defs>

  <!-- 背景（クリニック室内） -->
  <rect width="280" height="340" fill="url(#bgGr)" clip-path="url(#roundClip)"/>
  <!-- 壁 -->
  <rect x="0" y="0" width="280" height="228" fill="#fafffe" opacity="0.86" clip-path="url(#roundClip)"/>
  <!-- 床 -->
  <rect x="0" y="228" width="280" height="112" fill="#c8e6c9" opacity="0.48" clip-path="url(#roundClip)"/>
  <line x1="0" y1="228" x2="280" y2="228" stroke="#a5d6a7" stroke-width="2"/>

  <!-- 資格証（壁） -->
  <rect x="20" y="20" width="80" height="64" rx="3" fill="white" stroke="#c8e6c9" stroke-width="1.5"/>
  <rect x="26" y="26" width="68" height="52" rx="2" fill="#f9fbe7"/>
  <rect x="34" y="32" width="52" height="8" rx="2" fill="#a5d6a7" opacity="0.62"/>
  <line x1="34" y1="48" x2="86" y2="48" stroke="#c8e6c9" stroke-width="1.2"/>
  <line x1="34" y1="58" x2="78" y2="58" stroke="#c8e6c9" stroke-width="1.2"/>
  <line x1="34" y1="68" x2="82" y2="68" stroke="#c8e6c9" stroke-width="1.2"/>

  <!-- 医療十字エンブレム（壁） -->
  <circle cx="233" cy="54" r="26" fill="#e8f5e9"/>
  <rect x="228" y="38" width="10" height="32" rx="3" fill="#2d8a6e" opacity="0.54"/>
  <rect x="221" y="49" width="24" height="10" rx="3" fill="#2d8a6e" opacity="0.54"/>

  <!-- 体（白衣ベース） -->
  <path d="M30 340 L30 264 Q72 250 140 247 Q208 250 250 264 L250 340 Z" fill="#2d8a6e" clip-path="url(#roundClip)"/>
  <!-- 白衣 -->
  <path d="M46 340 L46 266 Q84 254 140 252 Q196 254 234 266 L234 340 Z" fill="url(#coatGr)" clip-path="url(#roundClip)"/>
  <!-- ラペル左 -->
  <path d="M122 252 L140 280 L104 252 Z" fill="#f0f0f0"/>
  <!-- ラペル右 -->
  <path d="M158 252 L140 280 L176 252 Z" fill="#f0f0f0"/>
  <!-- ネクタイ -->
  <path d="M134 278 L140 296 L146 278 L140 287 Z" fill="#1565c0" opacity="0.76"/>
  <!-- ポケット（胸元右） -->
  <rect x="180" y="280" width="40" height="30" rx="3" fill="white" stroke="#e0e0e0" stroke-width="1"/>
  <!-- ペン -->
  <line x1="190" y1="280" x2="188" y2="269" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <line x1="199" y1="280" x2="196" y2="268" stroke="#e53935" stroke-width="2" stroke-linecap="round"/>
  <!-- 名札 -->
  <rect x="62" y="282" width="78" height="32" rx="4" fill="white" stroke="#a5d6a7" stroke-width="1.5"/>
  <line x1="72" y1="295" x2="130" y2="295" stroke="#2d8a6e" stroke-width="1.5"/>
  <line x1="72" y1="305" x2="120" y2="305" stroke="#c8e6c9" stroke-width="1.5"/>

  <!-- 聴診器 -->
  <path d="M114 254 Q97 267 94 286 Q90 304 104 308 Q117 310 122 298 Q126 285 114 279"
        fill="none" stroke="#424242" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="103" cy="309" r="9" fill="#616161"/>
  <circle cx="103" cy="309" r="6" fill="#9e9e9e"/>
  <circle cx="103" cy="309" r="3" fill="#757575"/>

  <!-- 首 -->
  <path d="M122 216 Q122 250 140 252 Q158 250 158 216 Z" fill="url(#skinGr)"/>

  <!-- 頭部 -->
  <ellipse cx="140" cy="170" rx="60" ry="63" fill="url(#skinGr)"/>
  <!-- 顎のシェーディング -->
  <ellipse cx="140" cy="208" rx="36" ry="12" fill="#c4804a" opacity="0.22"/>

  <!-- 髪（黒・プロフェッショナル） -->
  <path d="M82 163 Q80 100 140 95 Q200 100 198 163 Q192 118 140 121 Q88 118 82 163 Z" fill="#1a0804"/>
  <path d="M82 163 Q80 178 85 188 Q83 173 87 168 Z" fill="#1a0804"/>
  <path d="M198 163 Q200 178 195 188 Q197 173 193 168 Z" fill="#1a0804"/>

  <!-- 耳 -->
  <ellipse cx="81" cy="179" rx="9" ry="13" fill="#d4956a"/>
  <ellipse cx="81" cy="179" rx="5" ry="8" fill="#c47a50" opacity="0.48"/>
  <ellipse cx="199" cy="179" rx="9" ry="13" fill="#d4956a"/>
  <ellipse cx="199" cy="179" rx="5" ry="8" fill="#c47a50" opacity="0.48"/>

  <!-- 眉 -->
  <path d="M108 152 Q120 147 132 150" fill="none" stroke="#1a0804" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M148 150 Q160 147 172 152" fill="none" stroke="#1a0804" stroke-width="2.8" stroke-linecap="round"/>

  <!-- 左目 -->
  <ellipse cx="120" cy="163" rx="12" ry="9" fill="white"/>
  <circle cx="121" cy="163" r="6" fill="#1a0804"/>
  <circle cx="123" cy="161" r="2.2" fill="white" opacity="0.8"/>
  <path d="M108 157 Q120 154 132 157" fill="none" stroke="#1a0804" stroke-width="1.5" opacity="0.56"/>

  <!-- 右目 -->
  <ellipse cx="160" cy="163" rx="12" ry="9" fill="white"/>
  <circle cx="161" cy="163" r="6" fill="#1a0804"/>
  <circle cx="163" cy="161" r="2.2" fill="white" opacity="0.8"/>
  <path d="M148 157 Q160 154 172 157" fill="none" stroke="#1a0804" stroke-width="1.5" opacity="0.56"/>

  <!-- 鼻 -->
  <path d="M134 184 Q140 191 146 184" fill="none" stroke="#b06840" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M136 184 Q136 178 140 177 Q144 178 144 184" fill="none" stroke="#b06840" stroke-width="1.2" opacity="0.48"/>

  <!-- 口（穏やかな微笑み） -->
  <path d="M120 202 Q140 215 160 202" fill="none" stroke="#9e5535" stroke-width="2.3" stroke-linecap="round"/>
  <path d="M127 200 Q135 196 140 198 Q145 196 153 200" fill="none" stroke="#9e5535" stroke-width="1.2" opacity="0.45"/>

  <!-- 下部グリーンバー -->
  <rect x="0" y="318" width="280" height="22" fill="#2d8a6e" clip-path="url(#roundClip)"/>
</svg>
